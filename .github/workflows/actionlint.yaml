on:
  push:
    branches: [main, master]
  pull_request:

name: actionlint.yaml

permissions: read-all

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
