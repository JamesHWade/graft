on:
  push:
    branches: [main, master]
  pull_request:

name: jarl.yaml

permissions: read-all

jobs:
  jarl:
    name: jarl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint R code
        uses: etiennebacher/setup-jarl@058bb1314a6badb33b006021eee53558d4c543aa # v0.1.0
        with:
          version: 0.5.0
          args: check --min-r-version 4.1.0 --output-format github
