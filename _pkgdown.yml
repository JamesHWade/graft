url: https://jameshwade.github.io/graft/
title: graft

repo:
  branch: main
  url:
    home: https://github.com/JamesHWade/graft/
    source: https://github.com/JamesHWade/graft/blob/main/
    issue: https://github.com/JamesHWade/graft/issues/
    user: https://github.com/

development:
  mode: auto
  version_label: warning
  version_tooltip: Development documentation

template:
  light-switch: true
  bslib:
    version: 5
    brand: _brand.yml
    pkgdown-nav-height: 72px
    navbar-light-bg: "#EEF7F3"
    navbar-dark-bg: "#12362D"

home:
  title: "graft: Traceable knowledge for R workflows"
  description: >
    Keep records consistent across runs, preserve claims with exact evidence,
    and provide bounded, schema-aware retrieval to analysts and AI tools.
  sidebar:
    structure: [links, license, authors, dev]

navbar:
  structure:
    left: [intro, change_control, examples, reference, news]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    change_control:
      text: Change control
      href: articles/knowledge-change-control.html
    examples:
      text: Examples
      href: articles/examples.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/JamesHWade/graft/
      aria-label: View graft on GitHub

footer:
  structure:
    left: developed_by
    right: [github, built_with]
  components:
    github: Source and issues are available on [GitHub](https://github.com/JamesHWade/graft).

articles:
  - title: Start here
    desc: >
      Follow one workflow from domain contract to traceable retrieval, or start
      from an ordinary LinkML schema and see how graft applies it in R.
    contents:
      - getting-started
      - knowledge-change-control
      - linkml-schema
  - title: Examples
    desc: >
      Small, runnable domain models adapted from established LinkML projects.
    contents:
      - examples

reference:
  - title: Schema
    desc: >
      Compile and inspect LinkML schemas and their generated manifests.
  - contents:
      - kg_compile_schema
      - kg_schema
      - kg_schema_diff
      - kg_classes
      - kg_slots
      - kg_enums
      - kg_schema_info
  - title: Store lifecycle
    desc: >
      Open, initialize, inspect, and close a DuckDB store.
  - contents:
      - kg_connect_duckdb
      - kg_init
      - kg_disconnect
      - kg_store_info
      - kg_capabilities
  - title: Ingestion and validation
    desc: >
      Validate and write records in batches with provenance and idempotency.
  - contents:
      - kg_batch
      - kg_ingest
      - kg_write
      - kg_validate_data
  - title: History and change control
    desc: >
      Inspect accepted revisions and apply explicitly reviewed additive schema
      migrations.
  - contents:
      - kg_batches
      - kg_changes
      - kg_history
      - kg_check_store
      - kg_plan_migration
      - kg_apply_migration
  - title: Records and identity
    desc: >
      Read records, search declared text fields, and resolve external
      identifiers.
  - contents:
      - kg_records
      - kg_find
      - kg_get
      - kg_lookup
      - kg_identifiers
      - kg_unresolved
  - title: Claims and evidence
    desc: >
      Inspect claims and the stored sources and locations that support or
      challenge them.
  - contents:
      - kg_claims
      - kg_evidence
      - kg_competing_claims
  - title: Graph projections
    desc: >
      Inspect graph nodes and edges or traverse a limited neighborhood.
  - contents:
      - kg_nodes
      - kg_edges
      - kg_neighbors
      - kg_traverse
      - kg_subgraph
  - title: Structured access
    desc: >
      Inspect the retrieval contract, run field-and-filter queries, and create
      ellmer tools.
  - contents:
      - kg_context
      - kg_select
      - kg_tools
  - title: Experimental integrations
    desc: >
      Package-specific adapters. Most graft users do not need these functions.
  - contents:
      - kg_ingest_tempest_records
      - tempest_artifact_store_graft
